<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Asisten - Pembuat Soal MA YPPS</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
    <style>
        :root {
            --primary-color: #deff9a;
            --bg-color: #111111;
            --card-bg: #1a1a1a;
            --text-color: #ffffff;
            --text-muted: #a0a0a0;
            --border-color: #333333;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            justify-content: space-between;
            box-sizing: border-box;
        }

        .container {
            width: 100%;
            max-width: 800px;
            background: var(--card-bg);
            border-radius: 16px;
            padding: 30px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
            border: 1px solid var(--border-color);
            box-sizing: border-box;
            margin-bottom: 30px;
        }

        .header {
            text-align: center;
            border-bottom: 2px solid var(--border-color);
            padding-bottom: 20px;
            margin-bottom: 25px;
        }

        .badge {
            background-color: var(--primary-color);
            color: #000;
            padding: 6px 12px;
            border-radius: 20px;
            font-weight: bold;
            font-size: 14px;
            display: inline-block;
            margin-bottom: 10px;
        }

        h1 {
            margin: 0;
            font-size: 28px;
        }

        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 20px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
        }

        .form-group.full-width {
            grid-column: span 2;
        }

        label {
            font-size: 14px;
            color: var(--text-muted);
            margin-bottom: 8px;
            font-weight: 500;
        }

        input,
        select,
        textarea {
            background-color: #000;
            border: 1px solid var(--border-color);
            color: #fff;
            padding: 12px;
            border-radius: 8px;
            font-size: 15px;
            outline: none;
            transition: 0.3s;
        }

        input:focus,
        select:focus,
        textarea:focus {
            border-color: var(--primary-color);
        }

        .file-upload-box {
            border: 2px dashed #444;
            padding: 20px;
            text-align: center;
            border-radius: 8px;
            background: #0d0d0d;
            cursor: pointer;
            transition: 0.3s;
        }

        .file-upload-box:hover {
            border-color: var(--primary-color);
        }

        .file-status {
            font-size: 13px;
            color: var(--primary-color);
            margin-top: 8px;
            display: none;
        }

        button {
            background-color: var(--primary-color);
            color: #000;
            border: none;
            padding: 14px;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            width: 100%;
            transition: 0.2s;
        }

        button:hover {
            opacity: 0.9;
            transform: translateY(-1px);
        }

        button:disabled {
            background-color: #555;
            color: #888;
            cursor: not-allowed;
        }

        .result-box {
            margin-top: 30px;
            background-color: #0b0b0b;
            padding: 20px;
            border-radius: 8px;
            border: 1px solid var(--border-color);
            display: none;
            white-space: pre-wrap;
            line-height: 1.6;
        }

        .loading {
            text-align: center;
            color: var(--primary-color);
            display: none;
            margin-top: 20px;
            font-style: italic;
        }

        footer {
            text-align: center;
            padding: 15px;
            color: var(--text-muted);
            font-size: 14px;
            letter-spacing: 0.5px;
            border-top: 1px solid var(--border-color);
            width: 100%;
            max-width: 800px;
        }

        footer span {
            color: var(--primary-color);
            font-weight: 500;
        }
    </style>
</head>

<body>

    <div class="container">
        <div class="header">
            <span class="badge">AI ASISTEN MA v4</span>
            <h1>Generator Soal - MA YPPS SUKAHURIP</h1>
        </div>

        <div class="form-grid">
            <div class="form-group">
                <label for="mataPelajaran">Mata Pelajaran (Umum / Keagamaan)</label>
                <input type="text" id="mataPelajaran" placeholder="Contoh: Fiqih, Akidah Akhlak, Geografi...">
            </div>
            <div class="form-group">
                <label for="kelas">Kelas</label>
                <select id="kelas">
                    <option value="Kelas X (10)">Kelas X</option>
                    <option value="Kelas XI (11)">Kelas XI</option>
                    <option value="Kelas XII (12)">Kelas XII</option>
                </select>
            </div>
            <div class="form-group">
                <label for="tipeSoal">Tipe Soal</label>
                <select id="tipeSoal">
                    <option value="Pilihan Ganda Biasa (A, B, C, D, E)">Pilihan Ganda Biasa</option>
                    <option value="Pilihan Ganda Kompleks (Pilih 3 jawaban benar dari opsi A, B, C, D, E)">Pilihan Ganda
                        Kompleks (3 Benar)</option>
                    <option value="Esai / Isian">Esai / Isian</option>
                </select>
            </div>
            <div class="form-group">
                <label for="jumlahSoal">Jumlah Soal</label>
                <input type="number" id="jumlahSoal" value="5" min="1" max="20">
            </div>

            <div class="form-group full-width">
                <label>Upload File Materi (PDF, Gambar Buku/Catatan, atau TXT)</label>
                <div class="file-upload-box" onclick="document.getElementById('fileInput').click()">
                    <p style="margin: 0; color: var(--text-muted);">Klik di sini untuk upload dokumen materi</p>
                    <input type="file" id="fileInput" accept=".pdf, .png, .jpg, .jpeg, .txt" multyple
                        style="display: none;" onchange="handleFileSelection()">
                    <div class="file-status" id="fileStatusText"></div>
                    <div id="uploadedFiles" style="
margin-top:10px;
font-size:14px;
color:#deff9a;
">

                    </div>

                    <button type="button" onclick="hapusSemuaFile()" style="
margin-top:10px;
background:#ff4444;
color:white;
padding:8px;
border:none;
border-radius:6px;
cursor:pointer;
">

                        Hapus Semua File

                    </button>
                </div>
            </div>

            <div class="form-group full-width">
                <label for="materi">Isi Teks Materi / Catatan Tambahan</label>
                <textarea id="materi" rows="5"
                    placeholder="Teks hasil ekstrak file atau input manual Anda akan tampil di sini..."></textarea>
            </div>
        </div>

        <button id="btnGenerate" onclick="generateSoal()">Mulai Buat Soal MA Otomatis</button>

        <div class="loading" id="loadingText">Menyiapkan dokumen dan meracik soal berkualitas tinggi... Mohon tunggu...
        </div>
        <div class="result-box" id="resultBox"></div>
    </div>

    <footer>
        Aplikasi dibuat oleh <span>Hendri Kurniawan</span>
    </footer>

    <script>
        
        const OPENROUTER_KEY =
        window.OPENROUTER_KEY || "";

        // API Key Anda yang valid dari Google AI Studio
        const _0xKEY = "AIzaSyBwLFo631wZ38WOL6sUnI3MdULojp4d9FA";

        // Konfigurasi Worker PDF.js lokal
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.worker.min.js';

        let uploadedFiles = [];
        let extractedText = "";

        async function handleFileSelection() {

            const files =
                document.getElementById(
                    'fileInput'
                ).files;

            const statusText =
                document.getElementById(
                    'fileStatusText'
                );


            uploadedFiles.push(
                ...files
            );


            for (const file of files) {

                try {

                    // FOTO
                    if (
                        file.type.startsWith(
                            'image/'
                        )
                    ) {

                        statusText.innerText =
                            `📷 Membaca gambar:
${file.name}`;

                        const result =
                            await Tesseract
                                .recognize(
                                    file,
                                    'ind'
                                );

                        extractedText +=

                            "\n\n"

                            +

                            result.data.text;

                    }



                    // PDF
                    else if (

                        file.type ===
                        "application/pdf"

                    ) {

                        statusText.innerText =
                            `📄 Membaca PDF:
${file.name}`;

                        const pdf =
                            await pdfjsLib
                                .getDocument(
                                    await file.arrayBuffer()
                                ).promise;

                        let text = "";


                        for (
                            let i = 1;
                            i <= pdf.numPages;
                            i++
                        ) {

                            const page =
                                await pdf.getPage(i);

                            const content =
                                await page
                                    .getTextContent();

                            text +=
                                content.items
                                    .map(
                                        x => x.str
                                    )
                                    .join(" ");

                        }


                        extractedText +=
                            "\n\n" + text;

                    }



                    // TXT
                    else {

                        const text =
                            await file.text();

                        extractedText +=
                            "\n\n" + text;

                    }

                }
                catch (err) {

                    console.log(err);

                }

            }


            statusText.innerText =
                `${uploadedFiles.length}
file berhasil ditambahkan`;

            tampilkanFile();

        }

        async function generateSoal() {
            const mataPelajaran = document.getElementById('mataPelajaran').value || 'Materi Umum';
            const kelas = document.getElementById('kelas').value;
            const tipeSoal = document.getElementById('tipeSoal').value;
            const jumlahSoal = document.getElementById('jumlahSoal').value;
            const materiInput = document.getElementById('materi').value;
            let isiFile = "";
            for (
                const file of uploadedFiles
            ) {

                isiFile +=

                    "\nFile: "
                    +
                    file.name;

            }

            const btn = document.getElementById('btnGenerate');
            const loading = document.getElementById('loadingText');
            const resultBox = document.getElementById('resultBox');

            btn.disabled = true;
            loading.style.display = 'block';
            resultBox.style.display = 'none';

            const promptText = `Anda adalah seorang guru senior dan ahli pembuat soal ujian profesional untuk tingkat Madrasah Aliyah (MA). 
Tolong buatkan soal ujian dengan spesifikasi berikut:
- Tingkat Pendidikan: Madrasah Aliyah (MA)
- Kelas: ${kelas}
- Mata Pelajaran: ${mataPelajaran}
- Tipe Soal: ${tipeSoal}
- Jumlah Soal: ${jumlahSoal}
- Referensi Materi: ${materiInput} Isi file upload: ${extractedText} 'Sesuaikan dengan kurikulum standar Madrasah Aliyah (MA) yang berlaku.'}

Ketentuan Output Khusus Tipe Soal:
1. Anda adalah guru profesional yang ahli dalam membuat soal, yang tahu aturan aturan dalam membuat soal
2. Jika tipe soal yang dipilih adalah "Pilihan Ganda Kompleks", buatlah struktur pertanyaan di mana dari opsi A, B, C, D, dan E, ada TEPAT 3 JAWABAN YANG BENAR. Siswa diminta untuk memilih 3 jawaban benar tersebut.
3. Semua bentuk soal pilihan ganda (baik biasa maupun kompleks) wajib menggunakan opsi pilihan dari A sampai E secara alfabetis dan rapi.
4. Soal harus berbobot tingkat berpikir tinggi (HOTS) dan juga Keterampilan berpikir tingkat rendah yang berfokus pada fungsi kognitif dasar (LOTS) serta mengacu erat pada referensi materi pokok yang disediakan.
5. Jangan sampai jauh melenceng dari sumber yang diberikan.
6. Berikan KUNCI JAWABAN yang jelas beserta PEMBAHASAN singkat untuk setiap nomor di bagian paling bawah setelah seluruh daftar soal selesai dibuat. Untuk tipe kompleks, sebutkan ketiga huruf/opsi yang menjadi jawaban benarnya.
7. Jangan memberikan kalimat pembuka atau penutup basa-basi, langsung tampilkan daftarnya secara rapi.`;

            try {
                // Menggunakan Endpoint v1beta dengan config yang lebih lengkap untuk stabilitas akun baru
                const response =
                    await fetch(
                        "/api/chat",
                        {

                            method: "POST",

                            headers: {

                                Authorization:
                                "Bearer " + window.OPENROUTER_KEY,

                                "Content-Type":
                                    "application/json",

                                "HTTP-Referer":
                                    "http://localhost:5500",

                                "X-Title":
                                    "Generator Soal MA"


                            },

                            body: JSON.stringify({

                                model:
                                    "openai/gpt-oss-20b:free",

                                messages: [
                                    {
                                        role: "user",
                                        content: promptText
                                    }
                                ]

                            })

                        }

                    );

                const data = await response.json();

                console.log("RESPON:", data);


                // Jika API mengirim error
                if (data.error) {

                    resultBox.innerText =
                        "Error:\n\n" +
                        data.error.message;

                    resultBox.style.display =
                        'block';

                    return;

                }


                // Jika jawaban AI ada
                if (
                    data.choices &&
                    Array.isArray(data.choices) &&
                    data.choices.length > 0 &&
                    data.choices[0].message &&
                    data.choices[0].message.content
                ) {

                    resultBox.innerText =
                        data.choices[0]
                            .message.content;

                    resultBox.style.display =
                        'block';

                }

                else {

                    console.log(data);

                    resultBox.innerText =
                        "Gagal membaca respon AI.";

                    resultBox.style.display =
                        'block';

                    return;
                }


                if (
                    data.choices &&
                    data.choices[0] &&
                    data.choices[0].message &&
                    data.choices[0].message.content
                ) {

                    let hasilAI =
                        data.choices[0]
                            .message.content;

                    resultBox.innerText =
                        hasilAI;

                    resultBox.style.display =
                        'block';

                }

                else {

                    console.log(data);

                    resultBox.innerText =
                        "Gagal memproses.\nRespon AI kosong.";

                    resultBox.style.display =
                        'block';

                }
            }
            catch (error) {

                console.error(error);

                resultBox.innerText =
                    "Error:\n\n" +
                    error.message;

                resultBox.style.display =
                    "block";

            }
            finally {
                btn.disabled = false;
                loading.style.display = 'none';
            }
        }
        function tampilkanFile() {

            const fileList =
                document.getElementById(
                    'uploadedFiles'
                );

            fileList.innerHTML =
                "";


            uploadedFiles.forEach(

                (file, index) => {

                    fileList.innerHTML +=

                        `

    <div style="
display:flex;
justify-content:
space-between;

margin-bottom:8px;

background:#222;

padding:8px;

border-radius:6px;
">

        <span>

            📄 ${file.name}

        </span>


        <button onclick="hapusFile(${index})" style="
background:red;
color:white;
border:none;
padding:5px 10px;
cursor:pointer;
">

            ❌

        </button>

    </div>

    `;

                });

        }

        function hapusFile(index) {

            uploadedFiles.splice(
                index,
                1
            );

            tampilkanFile();

        }

        function hapusFile(index) {

            uploadedFiles.splice(
                index,
                1
            );

            tampilkanFile();

        }
    
    </script>
    <script src="script.js"></script>


</body>


</html>
